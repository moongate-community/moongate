name: GitHub Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.7.7 or 0.7.7)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-linux-x64:
    runs-on:
      group: Default
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION=""
          if [[ -n "${{ github.ref_name }}" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            if [[ "$VERSION" != v* ]]; then
              VERSION="v${VERSION}"
            fi
          else
            VERSION="v0.0.0-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Restore
        run: dotnet restore -r "linux-x64" src/Moongate.Server/Moongate.Server.csproj

      - name: Publish
        run: >
          dotnet publish
          src/Moongate.Server/Moongate.Server.csproj
          -c Release
          -r "linux-x64"
          --self-contained true
          -p:PublishAot=false
          --no-restore
          -o "dist/moongate-linux-x64"

      - name: Archive (tar.gz)
        run: |
          mkdir -p artifacts
          tar -C dist -czf "artifacts/moongate-linux-x64-${{ steps.version.outputs.version }}.tar.gz" "moongate-linux-x64"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: moongate-linux-x64
          path: artifacts/*
          if-no-files-found: error

  build-osx-arm64:
    runs-on: macos-14
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION=""
          if [[ -n "${{ github.ref_name }}" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            if [[ "$VERSION" != v* ]]; then
              VERSION="v${VERSION}"
            fi
          else
            VERSION="v0.0.0-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Restore
        run: dotnet restore -r "osx-arm64" src/Moongate.Server/Moongate.Server.csproj

      - name: Publish
        run: >
          dotnet publish
          src/Moongate.Server/Moongate.Server.csproj
          -c Release
          -r "osx-arm64"
          --self-contained true
          -p:PublishAot=false
          --no-restore
          -o "dist/moongate-osx-arm64"

      - name: Archive (tar.gz)
        run: |
          mkdir -p artifacts
          tar -C dist -czf "artifacts/moongate-osx-arm64-${{ steps.version.outputs.version }}.tar.gz" "moongate-osx-arm64"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: moongate-osx-arm64
          path: artifacts/*
          if-no-files-found: error

  release:
    needs: [build-linux-x64, build-osx-arm64]
    runs-on:
      group: Default
    container:
      image: python:3.12-bookworm
    defaults:
      run:
        shell: bash
    env:
      DISCORD_CHANGELOG_WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION=""
          if [[ -n "${{ github.ref_name }}" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            if [[ "$VERSION" != v* ]]; then
              VERSION="v${VERSION}"
            fi
          else
            VERSION="v0.0.0-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Extract changelog notes
        id: notes
        shell: bash
        run: |
          VERSION_NO_V="${{ steps.version.outputs.version }}"
          VERSION_NO_V="${VERSION_NO_V#v}"

          awk -v version="$VERSION_NO_V" '
            $0 ~ "^## \\["version"\\]" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > release_notes.md

          if [[ ! -s release_notes.md ]]; then
            echo "Release ${VERSION_NO_V}" > release_notes.md
            echo "" >> release_notes.md
            echo "See CHANGELOG.md for details." >> release_notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: |
            release-artifacts/**/*.tar.gz
          fail_on_unmatched_files: true

      - name: Skip Discord changelog webhook
        if: ${{ env.DISCORD_CHANGELOG_WEBHOOK_URL == '' }}
        run: echo "DISCORD_CHANGELOG_WEBHOOK_URL is not configured; skipping Discord changelog post."

      - name: Post changelog to Discord
        if: ${{ env.DISCORD_CHANGELOG_WEBHOOK_URL != '' }}
        run: >
          python3 scripts/discord_changelog_webhook.py
          --version "${{ steps.version.outputs.version }}"
          --repo "${{ github.repository }}"
          --notes-file release_notes.md
          --webhook-url "$DISCORD_CHANGELOG_WEBHOOK_URL"
